version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: zettl_mongo
    restart: unless-stopped
    volumes:
      - zettl_mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - zettl_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zettl_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - zettl_uploads:/uploads
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    networks:
      - zettl_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zettl_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - zettl_net
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx:
    image: nginx:alpine
    container_name: zettl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - zettl_net

volumes:
  zettl_mongo_data:
  zettl_uploads:

networks:
  zettl_net:
    driver: bridge
